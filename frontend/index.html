<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Volt - Estoque</title>
</head>
<body>
    <div id="app">
        <h1>Controle de Estoque Volt</h1>
        
        <section id="cadastro-material">
            <h2>Cadastrar novo material</h2>
            <form id="form-material">
                <div class="input-group">
                <input type="text" id="nome" placeholder="Nome do Material" required>
                <input type="text" id="marca" placeholder="Marca">
                </div>    

                <div class="input-group">
                <input type="text" id="cor" placeholder="Cor">
                <input type="text" id="especificacao_tecnica" placeholder="Especificação Técnica">
                </div>
                
                <div class="input-group">
                <input type="number" id="quantidade" placeholder="Quantidade" required>
                <input type="text" id="unidade" placeholder="Unidade (Ex: Rolo 10m, un)" required>
                </div>
                <button type="submit">Cadastrar no Estoque</button>
            </form>
        </section>

        <hr>
        
        <section id="estoque">
            <h2>Materiais em Estoque</h2>
            <ul id="lista-materiais">
                <!-- O TypeScript vai injetar os itens aqui -->
            </ul>
        </section>

    </div>
    
    <script type="module" src="/src/index.ts"></script>
</body>
</html>
